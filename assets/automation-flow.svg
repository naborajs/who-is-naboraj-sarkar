<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" width="1000" height="320">
  <title>Event-Driven Automation Flow</title>
  <desc>Architecture diagram illustrating Naboraj Sarkar's automated pipelines, capturing input, validating data, and committing directly to version control.</desc>

  <defs>
    <!-- Background Space Fade -->
    <linearGradient id="af-bgSpace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#07111F" />
      <stop offset="100%" stop-color="#0D1B2A" />
    </linearGradient>

    <!-- Glass Panel Gradient -->
    <linearGradient id="af-glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#102A43" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#07111F" stop-opacity="0.8" />
    </linearGradient>

    <!-- Highlight Borders -->
    <linearGradient id="af-border-cyan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.1" />
    </linearGradient>

    <!-- Circuit Mesh Pattern -->
    <pattern id="af-mesh" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#F8FAFC" opacity="0.05" />
      <line x1="2" y1="2" x2="20" y2="2" stroke="#F8FAFC" stroke-width="0.5" opacity="0.02" />
      <line x1="2" y1="2" x2="2" y2="20" stroke="#F8FAFC" stroke-width="0.5" opacity="0.02" />
    </pattern>

    <!-- Blur Effects -->
    <filter id="af-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="af-aurora" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="50" />
    </filter>
  </defs>

  <style>
    @keyframes af-flow {
      0% { stroke-dashoffset: 40; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes af-packet {
      0% { transform: translateX(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateX(110px); opacity: 0; }
    }
    @keyframes af-pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    .flow-line {
      stroke-dasharray: 4 8;
      animation: af-flow 2s linear infinite;
    }
    .data-packet { animation: af-packet 2s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
    .pulse-dot { animation: af-pulse 1.5s ease-in-out infinite; }
    .delay-1 { animation-delay: 0.5s; }
    .delay-2 { animation-delay: 1.0s; }
    .delay-3 { animation-delay: 1.5s; }
  </style>

  <!-- Background Layer -->
  <rect width="1000" height="320" rx="20" fill="url(#af-bgSpace)" />
  <rect width="1000" height="320" rx="20" fill="url(#af-mesh)" />

  <!-- Radial Lighting Layer -->
  <ellipse cx="200" cy="120" rx="150" ry="100" fill="#38BDF8" opacity="0.05" filter="url(#af-aurora)" />
  <ellipse cx="500" cy="120" rx="200" ry="100" fill="#06B6D4" opacity="0.05" filter="url(#af-aurora)" />
  <ellipse cx="800" cy="120" rx="150" ry="100" fill="#38BDF8" opacity="0.05" filter="url(#af-aurora)" />

  <!-- The Pipeline Base Lines -->
  <path d="M 230 110 L 320 110" fill="none" stroke="#102A43" stroke-width="4" />
  <path d="M 470 110 L 560 110" fill="none" stroke="#102A43" stroke-width="4" />
  <path d="M 710 110 L 800 110" fill="none" stroke="#102A43" stroke-width="4" />

  <!-- The Animated Data Flow -->
  <path d="M 230 110 L 320 110" fill="none" stroke="#38BDF8" stroke-width="2" class="flow-line" />
  <path d="M 470 110 L 560 110" fill="none" stroke="#38BDF8" stroke-width="2" class="flow-line delay-1" />
  <path d="M 710 110 L 800 110" fill="none" stroke="#38BDF8" stroke-width="2" class="flow-line delay-2" />

  <!-- Data Packets -->
  <circle cx="230" cy="110" r="4" fill="#38BDF8" filter="url(#af-glow)" class="data-packet" />
  <circle cx="470" cy="110" r="4" fill="#38BDF8" filter="url(#af-glow)" class="data-packet delay-1" />
  <circle cx="710" cy="110" r="4" fill="#38BDF8" filter="url(#af-glow)" class="data-packet delay-2" />

  <!-- Node 1: Capture (Telegram) -->
  <g transform="translate(60, 50)">
    <rect width="170" height="120" rx="16" fill="url(#af-glass)" stroke="url(#af-border-cyan)" stroke-width="1.5" />
    
    <rect x="15" y="20" width="32" height="32" rx="8" fill="#102A43" stroke="#38BDF8" stroke-width="1.5" />
    <g transform="translate(21, 26)" fill="none" stroke="#38BDF8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 2l-2 20-7-4-4 5v-6l11-10-14 8-5-2z" />
    </g>

    <text x="60" y="42" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#F8FAFC">Event Trigger</text>
    <text x="15" y="75" font-family="system-ui, sans-serif" font-size="12" fill="#94A3B8">Asynchronous</text>
    <text x="15" y="90" font-family="system-ui, sans-serif" font-size="12" fill="#94A3B8">Data Ingestion</text>

    <circle cx="150" cy="36" r="4" fill="#22C55E" class="pulse-dot" filter="url(#af-glow)" />
  </g>

  <!-- Node 2: Processing (Bot/Parser) -->
  <g transform="translate(320, 50)">
    <rect width="150" height="120" rx="16" fill="url(#af-glass)" stroke="url(#af-border-cyan)" stroke-width="1.5" filter="url(#af-glow)" />
    <rect x="0" y="0" width="150" height="120" rx="16" fill="#07111F" opacity="0.4" />
    
    <rect x="15" y="20" width="32" height="32" rx="8" fill="#102A43" stroke="#06B6D4" stroke-width="1.5" />
    <g transform="translate(21, 26)" fill="none" stroke="#06B6D4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="10" rx="2" />
      <circle cx="12" cy="5" r="2" />
      <path d="M12 7v4" />
      <line x1="8" y1="16" x2="8" y2="16" />
      <line x1="16" y1="16" x2="16" y2="16" />
    </g>

    <text x="60" y="42" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#F8FAFC">Validation</text>
    <text x="15" y="75" font-family="system-ui, sans-serif" font-size="12" fill="#CBD5E1">Schema Parsing &amp;</text>
    <text x="15" y="90" font-family="system-ui, sans-serif" font-size="12" fill="#CBD5E1">Payload Formatting</text>
  </g>

  <!-- Node 3: Routing (Webhook) -->
  <g transform="translate(560, 50)">
    <rect width="150" height="120" rx="16" fill="url(#af-glass)" stroke="url(#af-border-cyan)" stroke-width="1.5" />
    
    <rect x="15" y="20" width="32" height="32" rx="8" fill="#102A43" stroke="#38BDF8" stroke-width="1.5" />
    <g transform="translate(21, 26)" fill="none" stroke="#38BDF8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10" />
      <polyline points="12 6 12 12 16 14" />
    </g>

    <text x="60" y="42" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#F8FAFC">Webhook</text>
    <text x="15" y="75" font-family="system-ui, sans-serif" font-size="12" fill="#94A3B8">Secure Stateless</text>
    <text x="15" y="90" font-family="system-ui, sans-serif" font-size="12" fill="#94A3B8">API Routing</text>
  </g>

  <!-- Node 4: Storage (GitHub) -->
  <g transform="translate(800, 50)">
    <rect width="140" height="120" rx="16" fill="url(#af-glass)" stroke="url(#af-border-cyan)" stroke-width="1.5" />
    
    <rect x="15" y="20" width="32" height="32" rx="8" fill="#102A43" stroke="#38BDF8" stroke-width="1.5" />
    <g transform="translate(21, 26)" fill="none" stroke="#38BDF8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2" />
      <line x1="3" y1="9" x2="21" y2="9" />
      <line x1="9" y1="21" x2="9" y2="9" />
    </g>

    <text x="60" y="42" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#F8FAFC">Git Store</text>
    <text x="15" y="75" font-family="system-ui, sans-serif" font-size="12" fill="#94A3B8">Immutable</text>
    <text x="15" y="90" font-family="system-ui, sans-serif" font-size="12" fill="#94A3B8">Audit Commit</text>
    
    <circle cx="120" cy="100" r="4" fill="#22C55E" class="pulse-dot delay-3" filter="url(#af-glow)" />
  </g>

  <!-- Footer Context -->
  <g font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#94A3B8">
    <rect x="420" y="210" width="160" height="30" rx="15" fill="#102A43" stroke="#38BDF8" stroke-opacity="0.3" />
    <text x="500" y="230" fill="#38BDF8" text-anchor="middle" font-weight="700" letter-spacing="1">ZERO MANUAL EFFORT</text>
    
    <text x="500" y="275" text-anchor="middle">Eliminating repetitive workflows through resilient, event-driven automation pipelines.</text>
    <text x="500" y="295" text-anchor="middle" font-size="11" opacity="0.6">Event Trigger → Validation → Formatting → Secure Routing → Immutable Audit Log</text>
  </g>

</svg>