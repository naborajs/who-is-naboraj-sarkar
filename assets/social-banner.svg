<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360">
  <title>Engineering Network &amp; Collaboration Hub</title>
  <desc>Naboraj Sarkar's social and collaboration network, linking builders across GitHub, Telegram, X, and Email to discuss system design and open source.</desc>
  
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="sb-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111F" />
      <stop offset="50%" stop-color="#0D1B2A" />
      <stop offset="100%" stop-color="#102A43" />
    </linearGradient>
    
    <linearGradient id="sb-borderGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="50%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#22C55E" />
    </linearGradient>
    
    <radialGradient id="sb-hubGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#06B6D4" />
    </radialGradient>
    
    <!-- Tech Grid -->
    <pattern id="sb-dotgrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#F8FAFC" opacity="0.04" />
    </pattern>
    
    <filter id="sb-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Drop Shadow for Cards -->
    <filter id="sb-card-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <style>
    @keyframes sb-pulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.1); }
    }
    @keyframes sb-flow {
      0% { stroke-dashoffset: 40; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes sb-orbit {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .sb-pulse-node { animation: sb-pulse 2.5s ease-in-out infinite; transform-origin: center; }
    .sb-flow-line { stroke-dasharray: 4 8; animation: sb-flow 2s linear infinite; }
    .sb-orbit-ring { animation: sb-orbit 20s linear infinite; transform-origin: 900px 180px; }
    .sb-delay-1 { animation-delay: 0.5s; }
    .sb-delay-2 { animation-delay: 1.0s; }
    .sb-delay-3 { animation-delay: 1.5s; }
  </style>

  <rect width="1200" height="360" fill="url(#sb-bg)" />
  <rect width="1200" height="360" fill="url(#sb-dotgrid)" />

  <!-- The Identity Card (Left) -->
  <g filter="url(#sb-card-shadow)">
    <rect x="60" y="50" width="560" height="260" rx="24" fill="#07111F" fill-opacity="0.9" stroke="url(#sb-borderGrad)" stroke-width="1.5" />
    
    <text x="100" y="90" font-family="monospace" font-size="13" letter-spacing="3" font-weight="700" fill="#38BDF8">ENGINEERING NETWORK</text>
    <text x="100" y="140" font-family="system-ui, sans-serif" font-size="44" font-weight="800" fill="#F8FAFC" letter-spacing="-1">Collaboration Hub</text>
    <text x="100" y="175" font-family="system-ui, sans-serif" font-size="18" fill="#CBD5E1">Let's discuss system design, open-source, and AI architecture.</text>

    <!-- Communication Tags -->
    <g transform="translate(100, 215)" font-family="system-ui, sans-serif" font-size="13" font-weight="600">
      <rect x="0" y="0" width="95" height="36" rx="18" fill="#102A43" stroke="#38BDF8" stroke-opacity="0.3" />
      <circle cx="16" cy="18" r="4" fill="#38BDF8" class="sb-pulse-node" />
      <text x="28" y="23" fill="#38BDF8">GitHub</text>

      <rect x="110" y="0" width="110" height="36" rx="18" fill="#102A43" stroke="#06B6D4" stroke-opacity="0.3" />
      <circle cx="126" cy="18" r="4" fill="#06B6D4" class="sb-pulse-node sb-delay-1" />
      <text x="138" y="23" fill="#06B6D4">Telegram</text>

      <rect x="235" y="0" width="85" height="36" rx="18" fill="#102A43" stroke="#22C55E" stroke-opacity="0.3" />
      <circle cx="251" cy="18" r="4" fill="#22C55E" class="sb-pulse-node sb-delay-2" />
      <text x="263" y="23" fill="#22C55E">Email</text>
      
      <rect x="335" y="0" width="135" height="36" rx="18" fill="#102A43" stroke="#F59E0B" stroke-opacity="0.3" />
      <circle cx="351" cy="18" r="4" fill="#F59E0B" class="sb-pulse-node sb-delay-3" />
      <text x="363" y="23" fill="#F59E0B">X (Twitter)</text>
    </g>
  </g>

  <!-- The Bridge / Connection Pathway -->
  <path d="M620 180 Q 760 180 840 180" fill="none" stroke="#102A43" stroke-width="4" />
  <path d="M620 180 Q 760 180 840 180" fill="none" stroke="#38BDF8" stroke-width="2" class="sb-flow-line" />
  <circle cx="620" cy="180" r="4" fill="#38BDF8" filter="url(#sb-glow)" class="sb-pulse-node" />

  <!-- The Central Network Node (Right) -->
  
  <!-- Rotating Outer Rings -->
  <circle cx="900" cy="180" r="110" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.2" stroke-dasharray="10 10" class="sb-orbit-ring" />
  <circle cx="900" cy="180" r="140" fill="none" stroke="#22C55E" stroke-width="1" opacity="0.1" stroke-dasharray="5 15" class="sb-orbit-ring" style="animation-direction: reverse; animation-duration: 30s;" />

  <!-- Connection Lines to Platform Nodes -->
  <line x1="900" y1="180" x2="1000" y2="80" stroke="#38BDF8" stroke-width="2" class="sb-flow-line" />
  <line x1="900" y1="180" x2="1100" y2="180" stroke="#06B6D4" stroke-width="2" class="sb-flow-line sb-delay-1" />
  <line x1="900" y1="180" x2="1000" y2="280" stroke="#22C55E" stroke-width="2" class="sb-flow-line sb-delay-2" />
  <line x1="900" y1="180" x2="800" y2="280" stroke="#F59E0B" stroke-width="2" class="sb-flow-line sb-delay-3" />

  <!-- Central Naboraj Node -->
  <circle cx="900" cy="180" r="40" fill="url(#sb-hubGrad)" filter="url(#sb-glow)" opacity="0.9" />
  <circle cx="900" cy="180" r="38" fill="#07111F" />
  <text x="900" y="186" font-family="system-ui, sans-serif" font-size="18" font-weight="800" fill="#F8FAFC" text-anchor="middle" letter-spacing="1">NS</text>

  <!-- Node: GitHub -->
  <circle cx="1000" cy="80" r="24" fill="#0D1B2A" stroke="#38BDF8" stroke-width="2" filter="url(#sb-glow)" />
  <text x="1000" y="85" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#38BDF8" text-anchor="middle">GH</text>

  <!-- Node: Telegram -->
  <circle cx="1100" cy="180" r="24" fill="#0D1B2A" stroke="#06B6D4" stroke-width="2" filter="url(#sb-glow)" />
  <text x="1100" y="185" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#06B6D4" text-anchor="middle">TG</text>

  <!-- Node: Email -->
  <circle cx="1000" cy="280" r="24" fill="#0D1B2A" stroke="#22C55E" stroke-width="2" filter="url(#sb-glow)" />
  <text x="1000" y="285" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#22C55E" text-anchor="middle">@</text>

  <!-- Node: X (Twitter) -->
  <circle cx="800" cy="280" r="24" fill="#0D1B2A" stroke="#F59E0B" stroke-width="2" filter="url(#sb-glow)" />
  <text x="800" y="285" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#F59E0B" text-anchor="middle">X</text>

</svg>