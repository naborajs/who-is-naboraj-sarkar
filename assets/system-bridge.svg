<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <title>System Engineering Lifecycle</title>
  <desc>A premium architectural diagram illustrating the continuous feedback loop from Ideas, through Software, Backend, AI, Hardware, and back to Continuous Learning.</desc>
  
  <defs>
    <!-- Background Glows -->
    <radialGradient id="bgGlow1" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#102A43" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#07111F" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="bgGlow2" cx="80%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#07111F" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="bgGlow3" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#07111F" stop-opacity="0" />
    </radialGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#102A43" stroke-width="1" stroke-opacity="0.4" />
    </pattern>

    <!-- Card Gradients -->
    <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#102A43" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#0D1B2A" stop-opacity="0.95" />
    </linearGradient>
    <linearGradient id="cardBorder" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#102A43" stop-opacity="0.3" />
    </linearGradient>

    <!-- Pipe Gradient -->
    <linearGradient id="pipeColor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="33%" stop-color="#22C55E" />
      <stop offset="66%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>

    <!-- Filters -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="pipeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Track Path -->
    <path id="mainTrack" d="M 260 200 L 1340 200 A 60 60 0 0 1 1400 260 L 1400 640 A 60 60 0 0 1 1340 700 L 260 700 A 60 60 0 0 1 200 640 L 200 260 A 60 60 0 0 1 260 200 Z" />
  </defs>

  <style>
    @keyframes flow {
      from { stroke-dashoffset: 0; }
      to { stroke-dashoffset: -120; }
    }
    @keyframes flowReverse {
      from { stroke-dashoffset: 0; }
      to { stroke-dashoffset: 120; }
    }
    @keyframes float1 {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes float2 {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    @keyframes float3 {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    .animated-path {
      animation: flow 4s linear infinite;
    }
    .animated-path-reverse {
      animation: flowReverse 6s linear infinite;
    }
    .float-1 { animation: float1 6s ease-in-out infinite; }
    .float-2 { animation: float2 8s ease-in-out infinite; }
    .float-3 { animation: float3 10s ease-in-out infinite; }
    .glass-card {
      fill: url(#cardGrad);
      stroke: url(#cardBorder);
      stroke-width: 1.5;
      filter: url(#shadow);
    }
    .icon-glow {
      filter: drop-shadow(0 0 8px currentColor);
    }
  </style>

  <!-- Background -->
  <rect width="1600" height="900" fill="#07111F" />
  <rect width="100%" height="100%" fill="url(#grid)" />
  <rect width="100%" height="100%" fill="url(#bgGlow1)" />
  <rect width="100%" height="100%" fill="url(#bgGlow2)" />
  <rect width="100%" height="100%" fill="url(#bgGlow3)" />

  <!-- Floating Engineering Keywords -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#CBD5E1" opacity="0.35" font-weight="600" letter-spacing="1">
    <text x="120" y="80" class="float-1" style="animation-delay: 0.1s;">Open Source</text>
    <text x="450" y="100" class="float-2" style="animation-delay: 0.5s;">Problem Solving</text>
    <text x="800" y="70" class="float-3" style="animation-delay: 0.9s;">Clean Code</text>
    <text x="1150" y="90" class="float-1" style="animation-delay: 1.3s;">Rapid Prototyping</text>
    <text x="1420" y="100" class="float-2" style="animation-delay: 1.7s;">Cloud</text>
    
    <text x="120" y="820" class="float-3" style="animation-delay: 0.2s;">Research</text>
    <text x="450" y="840" class="float-1" style="animation-delay: 0.6s;">Scalability</text>
    <text x="800" y="820" class="float-2" style="animation-delay: 1.0s;">Performance</text>
    <text x="1150" y="850" class="float-3" style="animation-delay: 1.4s;">Innovation</text>
    <text x="1380" y="820" class="float-1" style="animation-delay: 1.8s;">Machine Learning</text>
    
    <text x="750" y="450" class="float-2" style="animation-delay: 0.3s;">Automation</text>
    <text x="1050" y="450" class="float-3" style="animation-delay: 0.7s;">System Design</text>
    <text x="400" y="450" class="float-1" style="animation-delay: 1.1s;">Architecture</text>
    
    <text x="1420" y="320" class="float-1" style="animation-delay: 0.4s;">Deployment</text>
    <text x="1420" y="580" class="float-2" style="animation-delay: 0.8s;">IoT Ecosystem</text>
    
    <text x="40" y="320" class="float-3" style="animation-delay: 1.2s;">Embedded Systems</text>
    <text x="60" y="580" class="float-1" style="animation-delay: 1.6s;">Hardware Loops</text>
  </g>

  <!-- Central Workflow Tracks -->
  <use href="#mainTrack" fill="none" stroke="#102A43" stroke-width="12" />
  <use href="#mainTrack" fill="none" stroke="url(#pipeColor)" stroke-width="4" stroke-dasharray="20 40" class="animated-path" opacity="0.85" filter="url(#pipeGlow)" />
  <use href="#mainTrack" fill="none" stroke="#F8FAFC" stroke-width="1.5" stroke-dasharray="5 25" class="animated-path-reverse" opacity="0.4" />

  <!-- Data Packets -->
  <circle r="6" fill="#F8FAFC" filter="url(#pipeGlow)">
    <animateMotion dur="20s" begin="0s" repeatCount="indefinite"><mpath href="#mainTrack" /></animateMotion>
  </circle>
  <circle r="6" fill="#38BDF8" filter="url(#pipeGlow)">
    <animateMotion dur="20s" begin="-5s" repeatCount="indefinite"><mpath href="#mainTrack" /></animateMotion>
  </circle>
  <circle r="6" fill="#22C55E" filter="url(#pipeGlow)">
    <animateMotion dur="20s" begin="-10s" repeatCount="indefinite"><mpath href="#mainTrack" /></animateMotion>
  </circle>
  <circle r="6" fill="#F59E0B" filter="url(#pipeGlow)">
    <animateMotion dur="20s" begin="-15s" repeatCount="indefinite"><mpath href="#mainTrack" /></animateMotion>
  </circle>

  <!-- CARDS -->

  <!-- Card 1: Ideas in Motion -->
  <g transform="translate(90, 140)">
    <rect x="0" y="0" width="220" height="120" rx="16" class="glass-card" />
    <g transform="translate(20, 22)" fill="none" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-glow">
      <path d="M9 21h6 M12 24v-1 M12 2a7 7 0 0 0-7 7c0 2.38 1.19 4.47 3 5.74V17a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-2.26c1.81-1.27 3-3.36 3-5.74a7 7 0 0 0-7-7z" />
    </g>
    <text x="60" y="38" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="16" fill="#F8FAFC">Ideas in Motion</text>
    <text x="60" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">Research</text>
    <text x="60" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">Brainstorming</text>
    <text x="60" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">Ideation Phase</text>
  </g>

  <!-- Card 2: Software -->
  <g transform="translate(390, 140)">
    <rect x="0" y="0" width="220" height="120" rx="16" class="glass-card" />
    <g transform="translate(20, 22)" fill="none" stroke="#38BDF8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-glow">
      <path d="M3 6a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6z M3 10h18" />
    </g>
    <text x="60" y="38" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="16" fill="#F8FAFC">Software</text>
    <text x="60" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">Browser / Client</text>
    <text x="60" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">React &amp; Vite</text>
    <text x="60" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">Frontend UI</text>
  </g>

  <!-- Card 3: Backend -->
  <g transform="translate(690, 140)">
    <rect x="0" y="0" width="220" height="120" rx="16" class="glass-card" />
    <g transform="translate(20, 22)" fill="none" stroke="#06B6D4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-glow">
      <path d="M4 17l6-6-6-6 M12 19h8" />
    </g>
    <text x="60" y="38" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="16" fill="#F8FAFC">Backend</text>
    <text x="60" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">API Layer</text>
    <text x="60" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">Node.js / Python</text>
    <text x="60" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">Microservices</text>
  </g>

  <!-- Card 4: Supabase -->
  <g transform="translate(990, 140)">
    <rect x="0" y="0" width="220" height="120" rx="16" class="glass-card" />
    <g transform="translate(20, 22)" fill="none" stroke="#22C55E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-glow">
      <ellipse cx="12" cy="5" rx="9" ry="3" />
      <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3" />
      <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5" />
    </g>
    <text x="60" y="38" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="16" fill="#F8FAFC">Supabase</text>
    <text x="60" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">PostgreSQL DB</text>
    <text x="60" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">Auth &amp; Storage</text>
    <text x="60" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">Realtime Sync</text>
  </g>

  <!-- Card 5: AI Engine -->
  <g transform="translate(1290, 140)">
    <rect x="0" y="0" width="220" height="120" rx="16" class="glass-card" />
    <g transform="translate(20, 22)" fill="none" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-glow">
      <path d="M12 2l2.4 7.6L22 12l-7.6 2.4L12 22l-2.4-7.6L2 12l7.6-2.4L12 2z M19 1l1 3 3 1-3 1-1 3-1-3-3-1 3-1z" />
    </g>
    <text x="60" y="38" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="16" fill="#F8FAFC">AI Engine</text>
    <text x="60" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">LLM Integration</text>
    <text x="60" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">Prompt Workflows</text>
    <text x="60" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">Agent Orchestration</text>
  </g>

  <!-- Card 6: Automation -->
  <g transform="translate(1290, 390)">
    <rect x="0" y="0" width="220" height="120" rx="16" class="glass-card" />
    <g transform="translate(20, 22)" fill="none" stroke="#38BDF8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-glow">
      <circle cx="12" cy="12" r="3" />
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
    </g>
    <text x="60" y="38" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="16" fill="#F8FAFC">Automation</text>
    <text x="60" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">CI/CD Pipelines</text>
    <text x="60" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">Webhooks &amp; Events</text>
    <text x="60" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">Background Jobs</text>
  </g>

  <!-- Card 7: System Playground -->
  <g transform="translate(1290, 640)">
    <rect x="0" y="0" width="220" height="120" rx="16" class="glass-card" />
    <g transform="translate(20, 22)" fill="none" stroke="#06B6D4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-glow">
      <path d="M10 2v7.31L2 20.5A2 2 0 0 0 3.73 24h16.54A2 2 0 0 0 22 20.5L14 9.31V2" />
      <line x1="8.5" y1="2" x2="15.5" y2="2" />
      <line x1="5" y1="16" x2="19" y2="16" />
    </g>
    <text x="60" y="38" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="16" fill="#F8FAFC">System Playground</text>
    <text x="60" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">Experiment</text>
    <text x="60" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">Rapid Prototype</text>
    <text x="60" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">Test &amp; Deploy</text>
  </g>

  <!-- Card 8: Smart Devices -->
  <g transform="translate(990, 640)">
    <rect x="0" y="0" width="220" height="120" rx="16" class="glass-card" />
    <g transform="translate(20, 22)" fill="none" stroke="#22C55E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-glow">
      <path d="M5 12.55a11 11 0 0 1 14.08 0" />
      <path d="M1.42 9a16 16 0 0 1 21.16 0" />
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
      <line x1="12" y1="20" x2="12.01" y2="20" />
    </g>
    <text x="60" y="38" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="16" fill="#F8FAFC">Smart Devices</text>
    <text x="60" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">IoT Sensors</text>
    <text x="60" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">Edge Computing</text>
    <text x="60" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">Telemetry</text>
  </g>

  <!-- Card 9: Experimental Board -->
  <g transform="translate(690, 640)">
    <rect x="0" y="0" width="220" height="120" rx="16" class="glass-card" />
    <g transform="translate(20, 22)" fill="none" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-glow">
      <rect x="4" y="4" width="16" height="16" rx="2" ry="2" />
      <rect x="9" y="9" width="6" height="6" />
      <line x1="9" y1="1" x2="9" y2="4" />
      <line x1="15" y1="1" x2="15" y2="4" />
      <line x1="9" y1="20" x2="9" y2="23" />
      <line x1="15" y1="20" x2="15" y2="23" />
      <line x1="20" y1="9" x2="23" y2="9" />
      <line x1="20" y1="14" x2="23" y2="14" />
      <line x1="1" y1="9" x2="4" y2="9" />
      <line x1="1" y1="14" x2="4" y2="14" />
    </g>
    <text x="60" y="38" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="16" fill="#F8FAFC">Experimental Board</text>
    <text x="60" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">Microcontrollers</text>
    <text x="60" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">Signal Mapping</text>
    <text x="60" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">Firmware</text>
  </g>

  <!-- Card 10: Hardware -->
  <g transform="translate(390, 640)">
    <rect x="0" y="0" width="220" height="120" rx="16" class="glass-card" />
    <g transform="translate(20, 22)" fill="none" stroke="#38BDF8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-glow">
      <line x1="22" y1="12" x2="2" y2="12" />
      <path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z" />
      <line x1="6" y1="16" x2="6.01" y2="16" />
      <line x1="10" y1="16" x2="10.01" y2="16" />
    </g>
    <text x="60" y="38" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="16" fill="#F8FAFC">Hardware</text>
    <text x="60" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">Circuitry</text>
    <text x="60" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">Physical Layer</text>
    <text x="60" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">Device Control</text>
  </g>

  <!-- Card 11: Feedback Loop -->
  <g transform="translate(90, 640)">
    <rect x="0" y="0" width="220" height="120" rx="16" class="glass-card" />
    <g transform="translate(20, 22)" fill="none" stroke="#06B6D4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-glow">
      <polyline points="23 4 23 10 17 10" />
      <polyline points="1 20 1 14 7 14" />
      <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
    </g>
    <text x="60" y="38" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="16" fill="#F8FAFC">Feedback Loop</text>
    <text x="60" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">User Telemetry</text>
    <text x="60" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">System Logs</text>
    <text x="60" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">Metrics &amp; Alerts</text>
  </g>

  <!-- Card 12: Continuous Learning -->
  <g transform="translate(90, 390)">
    <rect x="0" y="0" width="220" height="120" rx="16" class="glass-card" />
    <g transform="translate(20, 22)" fill="none" stroke="#22C55E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-glow">
      <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
      <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
    </g>
    <text x="60" y="38" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="16" fill="#F8FAFC">Continuous Learning</text>
    <text x="60" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">Data Analysis</text>
    <text x="60" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">Optimization</text>
    <text x="60" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">Knowledge Base</text>
  </g>
</svg>