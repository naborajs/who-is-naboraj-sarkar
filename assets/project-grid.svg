<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 580" width="1600" height="580">
  <title>Featured Engineering Projects</title>
  <desc>A showcase of practical software projects including Life Logger, Auto Contribution, and NS Fin, emphasizing developer tooling, automation, and performance.</desc>

  <defs>
    <!-- Background Glows -->
    <radialGradient id="pg-bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#102A43" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#07111F" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="pg-cyanGlow" cx="10%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#07111F" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="pg-blueGlow" cx="90%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#07111F" stop-opacity="0" />
    </radialGradient>

    <!-- Grid Pattern -->
    <pattern id="pg-grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#102A43" stroke-width="1" stroke-opacity="0.4" />
      <circle cx="0" cy="0" r="1.5" fill="#38BDF8" opacity="0.3" />
    </pattern>

    <!-- Card Gradients -->
    <linearGradient id="pg-cardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#102A43" stop-opacity="0.65" />
      <stop offset="100%" stop-color="#0D1B2A" stop-opacity="0.85" />
    </linearGradient>
    <linearGradient id="pg-cardBorder" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#102A43" stop-opacity="0.15" />
    </linearGradient>

    <!-- Filters -->
    <filter id="pg-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <filter id="pg-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes floatUp {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes borderPulse {
      0%, 100% { stroke-opacity: 0.3; }
      50% { stroke-opacity: 0.8; }
    }
    @keyframes particleDrift {
      0% { transform: translate(0, 0); opacity: 0; }
      20% { opacity: 0.5; }
      80% { opacity: 0.5; }
      100% { transform: translate(15px, -30px); opacity: 0; }
    }
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.5; filter: drop-shadow(0 0 4px currentColor); }
      50% { opacity: 1; filter: drop-shadow(0 0 10px currentColor); }
    }
    .floating-card-1 { animation: floatUp 6s ease-in-out infinite; }
    .floating-card-2 { animation: floatUp 6s ease-in-out infinite 2s; }
    .floating-card-3 { animation: floatUp 6s ease-in-out infinite 4s; }
    .animated-border { animation: borderPulse 4s ease-in-out infinite; }
    .particle { animation: particleDrift linear infinite; }
    .glow-dot { animation: pulseGlow 3s ease-in-out infinite; }
    .glass-panel {
      fill: url(#pg-cardGrad);
      stroke: url(#pg-cardBorder);
      stroke-width: 1.5;
      filter: url(#pg-shadow);
    }
  </style>

  <!-- Background Base -->
  <rect width="1600" height="580" fill="#07111F" />
  <rect width="100%" height="100%" fill="url(#pg-grid)" />
  <rect width="100%" height="100%" fill="url(#pg-bgGlow)" />
  <rect width="100%" height="100%" fill="url(#pg-cyanGlow)" />
  <rect width="100%" height="100%" fill="url(#pg-blueGlow)" />

  <!-- Floating Labels -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#CBD5E1" opacity="0.25" font-weight="600" letter-spacing="1.5">
    <text x="1350" y="60" class="particle" style="animation-duration: 10s;">AUTOMATION</text>
    <text x="1450" y="120" class="particle" style="animation-duration: 12s; animation-delay: 2s;">OPEN SOURCE</text>
    <text x="1100" y="80" class="particle" style="animation-duration: 15s; animation-delay: 1s;">SYSTEM DESIGN</text>
    <text x="850" y="40" class="particle" style="animation-duration: 11s; animation-delay: 3s;">PERFORMANCE</text>
    <text x="80" y="550" class="particle" style="animation-duration: 14s; animation-delay: 0s;">CLEAN ARCHITECTURE</text>
    <text x="1400" y="540" class="particle" style="animation-duration: 13s; animation-delay: 4s;">EXPERIMENTATION</text>
    <text x="100" y="480" class="particle" style="animation-duration: 16s; animation-delay: 2s;">CONTINUOUS LEARNING</text>
  </g>

  <!-- Particles -->
  <circle cx="20" cy="100" r="2" fill="#06B6D4" class="particle" style="animation-duration: 9s;" />
  <circle cx="1500" cy="50" r="2.5" fill="#38BDF8" class="particle" style="animation-duration: 14s;" />
  <circle cx="800" cy="30" r="1.5" fill="#22C55E" class="particle" style="animation-duration: 11s;" />
  <circle cx="1400" cy="480" r="2" fill="#F59E0B" class="particle" style="animation-duration: 15s;" />
  <circle cx="50" cy="520" r="2.5" fill="#38BDF8" class="particle" style="animation-duration: 12s;" />

  <!-- Header -->
  <g>
    <rect x="40" y="44" width="4" height="28" rx="2" fill="#38BDF8" filter="url(#pg-glow)" />
    <text x="60" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="#F8FAFC">Featured Projects</text>
    <text x="60" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#CBD5E1">A collection of practical software built through curiosity, experimentation, automation, and continuous learning.</text>
  </g>

  <!-- Card 1: Life Logger -->
  <g class="floating-card-1" transform="translate(60, 150)">
    <rect x="0" y="0" width="460" height="310" rx="20" class="glass-panel animated-border" />
    
    <rect x="30" y="30" width="48" height="48" rx="12" fill="#0D1B2A" stroke="#38BDF8" stroke-width="1.5" />
    <g transform="translate(42, 42)" fill="none" stroke="#38BDF8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="21 8 21 21 3 21 3 8" />
      <rect x="1" y="3" width="22" height="5" />
      <line x1="10" y1="12" x2="14" y2="12" />
    </g>
    
    <text x="95" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#F8FAFC">Life Logger</text>
    
    <rect x="340" y="38" width="90" height="24" rx="12" fill="#22C55E" fill-opacity="0.1" stroke="#22C55E" stroke-opacity="0.4" />
    <text x="385" y="54" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#22C55E" text-anchor="middle" font-weight="600" letter-spacing="0.5">OPEN SOURCE</text>
    
    <text x="30" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#CBD5E1">Capture, organize, and version personal activity</text>
    <text x="30" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#CBD5E1">across platforms.</text>
    
    <line x1="30" y1="145" x2="430" y2="145" stroke="#102A43" stroke-width="1.5" stroke-dasharray="2 4" />
    
    <circle cx="35" cy="175" r="3.5" fill="#38BDF8" class="glow-dot" style="animation-delay: 0.1s;" />
    <text x="50" y="179" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94A3B8">Telegram synchronization</text>
    
    <circle cx="35" cy="199" r="3.5" fill="#38BDF8" class="glow-dot" style="animation-delay: 0.6s;" />
    <text x="50" y="203" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94A3B8">Git-based history</text>
    
    <circle cx="35" cy="223" r="3.5" fill="#38BDF8" class="glow-dot" style="animation-delay: 1.1s;" />
    <text x="50" y="227" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94A3B8">Timeline visualization</text>
    
    <circle cx="35" cy="247" r="3.5" fill="#38BDF8" class="glow-dot" style="animation-delay: 1.6s;" />
    <text x="50" y="251" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94A3B8">Local-first architecture</text>
    
    <g font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#CBD5E1" font-weight="500">
      <rect x="30" y="270" width="60" height="24" rx="6" fill="#102A43" fill-opacity="0.6" stroke="#38BDF8" stroke-opacity="0.2" />
      <text x="60" y="286" text-anchor="middle">Node.js</text>
      
      <rect x="100" y="270" width="56" height="24" rx="6" fill="#102A43" fill-opacity="0.6" stroke="#38BDF8" stroke-opacity="0.2" />
      <text x="128" y="286" text-anchor="middle">GitHub</text>
      
      <rect x="166" y="270" width="56" height="24" rx="6" fill="#102A43" fill-opacity="0.6" stroke="#38BDF8" stroke-opacity="0.2" />
      <text x="194" y="286" text-anchor="middle">Python</text>
    </g>
  </g>

  <!-- Card 2: Auto Contribution -->
  <g class="floating-card-2" transform="translate(570, 150)">
    <rect x="0" y="0" width="460" height="310" rx="20" class="glass-panel animated-border" style="animation-delay: 1s;" />
    
    <rect x="30" y="30" width="48" height="48" rx="12" fill="#0D1B2A" stroke="#06B6D4" stroke-width="1.5" />
    <g transform="translate(42, 42)" fill="none" stroke="#06B6D4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="18" cy="18" r="3" />
      <circle cx="6" cy="6" r="3" />
      <path d="M13 6h3a2 2 0 0 1 2 2v7" />
      <line x1="6" y1="9" x2="6" y2="21" />
    </g>
    
    <text x="95" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#F8FAFC">Auto Contribution</text>
    
    <rect x="290" y="38" width="140" height="24" rx="12" fill="#06B6D4" fill-opacity="0.1" stroke="#06B6D4" stroke-opacity="0.4" />
    <text x="360" y="54" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#06B6D4" text-anchor="middle" font-weight="600" letter-spacing="0.5">ACTIVE DEVELOPMENT</text>
    
    <text x="30" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#CBD5E1">Orchestrated CI/CD pipelines to automate</text>
    <text x="30" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#CBD5E1">repository maintenance.</text>
    
    <line x1="30" y1="145" x2="430" y2="145" stroke="#102A43" stroke-width="1.5" stroke-dasharray="2 4" />
    
    <circle cx="35" cy="175" r="3.5" fill="#06B6D4" class="glow-dot" style="animation-delay: 0.3s;" />
    <text x="50" y="179" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94A3B8">GitHub Actions integration</text>
    
    <circle cx="35" cy="199" r="3.5" fill="#06B6D4" class="glow-dot" style="animation-delay: 0.8s;" />
    <text x="50" y="203" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94A3B8">Automated PR labeling</text>
    
    <circle cx="35" cy="223" r="3.5" fill="#06B6D4" class="glow-dot" style="animation-delay: 1.3s;" />
    <text x="50" y="227" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94A3B8">Schedule-based triggers</text>
    
    <circle cx="35" cy="247" r="3.5" fill="#06B6D4" class="glow-dot" style="animation-delay: 1.8s;" />
    <text x="50" y="251" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94A3B8">Repository health checks</text>
    
    <g font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#CBD5E1" font-weight="500">
      <rect x="30" y="270" width="84" height="24" rx="6" fill="#102A43" fill-opacity="0.6" stroke="#06B6D4" stroke-opacity="0.2" />
      <text x="72" y="286" text-anchor="middle">Automation</text>
      
      <rect x="124" y="270" width="56" height="24" rx="6" fill="#102A43" fill-opacity="0.6" stroke="#06B6D4" stroke-opacity="0.2" />
      <text x="152" y="286" text-anchor="middle">GitHub</text>
      
      <rect x="190" y="270" width="46" height="24" rx="6" fill="#102A43" fill-opacity="0.6" stroke="#06B6D4" stroke-opacity="0.2" />
      <text x="213" y="286" text-anchor="middle">Shell</text>
    </g>
  </g>

  <!-- Card 3: NS Fin -->
  <g class="floating-card-3" transform="translate(1080, 150)">
    <rect x="0" y="0" width="460" height="310" rx="20" class="glass-panel animated-border" style="animation-delay: 2s;" />
    
    <rect x="30" y="30" width="48" height="48" rx="12" fill="#0D1B2A" stroke="#F59E0B" stroke-width="1.5" />
    <g transform="translate(42, 42)" fill="none" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" />
      <polyline points="17 6 23 6 23 12" />
    </g>
    
    <text x="95" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#F8FAFC">NS Fin</text>
    
    <rect x="330" y="38" width="100" height="24" rx="12" fill="#F59E0B" fill-opacity="0.1" stroke="#F59E0B" stroke-opacity="0.4" />
    <text x="380" y="54" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#F59E0B" text-anchor="middle" font-weight="600" letter-spacing="0.5">EXPERIMENTAL</text>
    
    <text x="30" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#CBD5E1">A research-focused dashboard for processing</text>
    <text x="30" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#CBD5E1">and visualizing market data.</text>
    
    <line x1="30" y1="145" x2="430" y2="145" stroke="#102A43" stroke-width="1.5" stroke-dasharray="2 4" />
    
    <circle cx="35" cy="175" r="3.5" fill="#F59E0B" class="glow-dot" style="animation-delay: 0.5s;" />
    <text x="50" y="179" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94A3B8">Real-time API ingestion</text>
    
    <circle cx="35" cy="199" r="3.5" fill="#F59E0B" class="glow-dot" style="animation-delay: 1.0s;" />
    <text x="50" y="203" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94A3B8">Interactive data visualization</text>
    
    <circle cx="35" cy="223" r="3.5" fill="#F59E0B" class="glow-dot" style="animation-delay: 1.5s;" />
    <text x="50" y="227" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94A3B8">Advanced financial metrics</text>
    
    <circle cx="35" cy="247" r="3.5" fill="#F59E0B" class="glow-dot" style="animation-delay: 2.0s;" />
    <text x="50" y="251" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94A3B8">Scalable data pipelines</text>
    
    <g font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#CBD5E1" font-weight="500">
      <rect x="30" y="270" width="84" height="24" rx="6" fill="#102A43" fill-opacity="0.6" stroke="#F59E0B" stroke-opacity="0.2" />
      <text x="72" y="286" text-anchor="middle">TypeScript</text>
      
      <rect x="124" y="270" width="50" height="24" rx="6" fill="#102A43" fill-opacity="0.6" stroke="#F59E0B" stroke-opacity="0.2" />
      <text x="149" y="286" text-anchor="middle">React</text>
      
      <rect x="184" y="270" width="76" height="24" rx="6" fill="#102A43" fill-opacity="0.6" stroke="#F59E0B" stroke-opacity="0.2" />
      <text x="222" y="286" text-anchor="middle">Supabase</text>
    </g>
  </g>

  <!-- Footer -->
  <g>
    <line x1="60" y1="500" x2="1540" y2="500" stroke="#102A43" stroke-width="1.5" stroke-dasharray="4 4" />
    <text x="800" y="535" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">From automation and developer tooling to finance and productivity, each project explores a different engineering challenge</text>
    <text x="800" y="555" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">while emphasizing performance, simplicity, and thoughtful design.</text>
  </g>
</svg>