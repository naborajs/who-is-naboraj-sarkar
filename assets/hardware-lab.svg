<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" width="1000" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
  </defs>
  <rect width="1000" height="320" rx="24" fill="url(#bg)" />
  <g font-family="Inter, Arial, sans-serif" fill="#e2e8f0">
    <rect x="80" y="60" width="220" height="180" rx="24" fill="#111827" stroke="#334155" stroke-width="1.8" />
    <text x="190" y="110" font-size="18" font-weight="700" text-anchor="middle">Sensors</text>
    <text x="190" y="140" font-size="13" fill="#94a3b8" text-anchor="middle">temperature · motion · voltage</text>
    <rect x="410" y="60" width="220" height="180" rx="24" fill="#111827" stroke="#334155" stroke-width="1.8" />
    <text x="520" y="110" font-size="18" font-weight="700" text-anchor="middle">Controller</text>
    <text x="520" y="140" font-size="13" fill="#94a3b8" text-anchor="middle">microcontroller · device logic</text>
    <rect x="740" y="60" width="220" height="180" rx="24" fill="#111827" stroke="#334155" stroke-width="1.8" />
    <text x="850" y="110" font-size="18" font-weight="700" text-anchor="middle">Dashboard</text>
    <text x="850" y="140" font-size="13" fill="#94a3b8" text-anchor="middle">control · telemetry · feedback</text>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#38bdf8" />
    </marker>
  </defs>
  <path d="M300 150 L410 150" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)" />
  <path d="M630 150 L740 150" stroke="#7c3aed" stroke-width="4" marker-end="url(#arrow)" />
  <text x="500" y="270" font-family="Inter, Arial, sans-serif" fill="#94a3b8" font-size="14" text-anchor="middle">Hardware lab: sensors → controller → dashboard</text>
</svg>