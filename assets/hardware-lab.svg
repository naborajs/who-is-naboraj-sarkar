<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" width="1000" height="320">
  <title>Hardware Exploration Lab</title>
  <desc>Architecture diagram illustrating Naboraj Sarkar's hardware and software bridge, connecting embedded telemetry with cloud dashboards.</desc>

  <defs>
    <!-- Background Space Fade -->
    <linearGradient id="hl-bgSpace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#07111F" />
      <stop offset="100%" stop-color="#0D1B2A" />
    </linearGradient>

    <!-- Glass Panel Gradient -->
    <linearGradient id="hl-glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#102A43" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#07111F" stop-opacity="0.8" />
    </linearGradient>

    <!-- Highlight Borders -->
    <linearGradient id="hl-border-cyan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.1" />
    </linearGradient>
    
    <linearGradient id="hl-border-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0.1" />
    </linearGradient>

    <linearGradient id="hl-border-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0.1" />
    </linearGradient>

    <!-- Circuit Mesh Pattern -->
    <pattern id="hl-mesh" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#F8FAFC" opacity="0.05" />
      <line x1="2" y1="2" x2="20" y2="2" stroke="#F8FAFC" stroke-width="0.5" opacity="0.02" />
      <line x1="2" y1="2" x2="2" y2="20" stroke="#F8FAFC" stroke-width="0.5" opacity="0.02" />
    </pattern>

    <!-- Blur Effects -->
    <filter id="hl-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="hl-aurora" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="50" />
    </filter>
  </defs>

  <style>
    @keyframes hl-flow {
      0% { stroke-dashoffset: 200; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes hl-pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    @keyframes hl-scan {
      0% { transform: translateY(0); opacity: 0; }
      10% { opacity: 0.5; }
      90% { opacity: 0.5; }
      100% { transform: translateY(140px); opacity: 0; }
    }
    .flow-line {
      stroke-dasharray: 8 12;
      animation: hl-flow 3s linear infinite;
    }
    .pulse-dot { animation: hl-pulse 2s ease-in-out infinite; }
    .scan-line { animation: hl-scan 4s linear infinite; }
    .delay-1 { animation-delay: 0.5s; }
    .delay-2 { animation-delay: 1.5s; }
  </style>

  <!-- Background Layer -->
  <rect width="1000" height="320" rx="20" fill="url(#hl-bgSpace)" />
  <rect width="1000" height="320" rx="20" fill="url(#hl-mesh)" />

  <!-- Radial Lighting Layer -->
  <ellipse cx="200" cy="160" rx="150" ry="150" fill="#38BDF8" opacity="0.05" filter="url(#hl-aurora)" />
  <ellipse cx="500" cy="160" rx="200" ry="150" fill="#06B6D4" opacity="0.05" filter="url(#hl-aurora)" />
  <ellipse cx="800" cy="160" rx="150" ry="150" fill="#22C55E" opacity="0.05" filter="url(#hl-aurora)" />

  <!-- Data Connections (Foreground Layer) -->
  <path d="M 270 160 Q 380 160 380 160" fill="none" stroke="#102A43" stroke-width="4" />
  <path d="M 270 160 Q 380 160 380 160" fill="none" stroke="#38BDF8" stroke-width="2" class="flow-line" />
  <circle cx="325" cy="160" r="4" fill="#38BDF8" filter="url(#hl-glow)" class="pulse-dot" />

  <path d="M 620 160 Q 730 160 730 160" fill="none" stroke="#102A43" stroke-width="4" />
  <path d="M 620 160 Q 730 160 730 160" fill="none" stroke="#06B6D4" stroke-width="2" class="flow-line" />
  <circle cx="675" cy="160" r="4" fill="#06B6D4" filter="url(#hl-glow)" class="pulse-dot delay-1" />

  <!-- Module 1: Embedded Sensors -->
  <g transform="translate(60, 60)">
    <rect width="210" height="180" rx="16" fill="url(#hl-glass)" stroke="url(#hl-border-cyan)" stroke-width="1.5" />
    <rect x="0" y="0" width="210" height="180" rx="16" fill="none" />
    
    <!-- Scanning Highlight -->
    <g transform="translate(10, 20)">
      <rect width="190" height="2" fill="#38BDF8" filter="url(#hl-glow)" class="scan-line" />
    </g>

    <rect x="20" y="25" width="32" height="32" rx="8" fill="#102A43" stroke="#38BDF8" stroke-width="1.5" />
    <!-- Embedded Icon -->
    <g transform="translate(26, 31)" fill="none" stroke="#38BDF8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 8h4v4H8z" />
      <path d="M12 4v4 M8 4v4 M4 8h4 M4 12h4 M16 8h-4 M16 12h-4 M12 16v-4 M8 16v-4" />
    </g>

    <text x="20" y="85" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#F8FAFC">Physical Edge</text>
    <text x="20" y="105" font-family="system-ui, sans-serif" font-size="12" fill="#94A3B8">Sensor Arrays &amp; Telemetry</text>
    
    <g font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#38BDF8">
      <rect x="20" y="125" width="70" height="20" rx="10" fill="#38BDF8" fill-opacity="0.1" />
      <text x="55" y="139" text-anchor="middle">I2C / SPI</text>
      <rect x="95" y="125" width="80" height="20" rx="10" fill="#38BDF8" fill-opacity="0.1" />
      <text x="135" y="139" text-anchor="middle">GPIO Signals</text>
    </g>
  </g>

  <!-- Module 2: The Bridge Controller -->
  <g transform="translate(380, 40)">
    <rect width="240" height="220" rx="16" fill="url(#hl-glass)" stroke="url(#hl-border-blue)" stroke-width="2" filter="url(#hl-glow)" />
    <rect x="0" y="0" width="240" height="220" rx="16" fill="#07111F" opacity="0.4" />
    
    <!-- Rotating Ring Background -->
    <circle cx="120" cy="110" r="60" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.2" stroke-dasharray="10 5">
      <animateTransform attributeName="transform" type="rotate" from="0 120 110" to="360 120 110" dur="20s" repeatCount="indefinite" />
    </circle>

    <rect x="100" y="25" width="40" height="40" rx="10" fill="#102A43" stroke="#06B6D4" stroke-width="1.5" />
    <!-- Controller Icon -->
    <g transform="translate(108, 33)" fill="none" stroke="#06B6D4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="2" width="20" height="20" rx="4" />
      <path d="M8 2v20 M16 2v20 M2 8h20 M2 16h20" opacity="0.5" />
    </g>

    <text x="120" y="95" font-family="system-ui, sans-serif" font-size="18" font-weight="800" fill="#F8FAFC" text-anchor="middle">Microcontroller</text>
    <text x="120" y="115" font-family="system-ui, sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle">Embedded C / Device Logic</text>
    
    <!-- Code Snippet Box -->
    <rect x="20" y="135" width="200" height="60" rx="8" fill="#0D1B2A" stroke="#06B6D4" stroke-width="1" stroke-opacity="0.3" />
    <text x="35" y="155" font-family="monospace" font-size="10" fill="#94A3B8">while(sys.active) {</text>
    <text x="50" y="170" font-family="monospace" font-size="10" fill="#06B6D4">read_sensor_bus();</text>
    <text x="50" y="185" font-family="monospace" font-size="10" fill="#22C55E">dispatch_mqtt();</text>
    <text x="35" y="185" font-family="monospace" font-size="10" fill="#94A3B8" opacity="0">}</text>
  </g>

  <!-- Module 3: Cloud / Dashboard -->
  <g transform="translate(730, 60)">
    <rect width="210" height="180" rx="16" fill="url(#hl-glass)" stroke="url(#hl-border-green)" stroke-width="1.5" />
    
    <rect x="20" y="25" width="32" height="32" rx="8" fill="#102A43" stroke="#22C55E" stroke-width="1.5" />
    <!-- Cloud Icon -->
    <g transform="translate(26, 31)" fill="none" stroke="#22C55E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 16a4 4 0 0 1-.88-7.9m2.88-4.1a6 6 0 0 1 11.83 2.35 4 4 0 0 1-1.83 7.65" />
      <polyline points="12 12 12 20 M9 17l3 3 3-3" />
    </g>

    <text x="20" y="85" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#F8FAFC">Cloud Architecture</text>
    <text x="20" y="105" font-family="system-ui, sans-serif" font-size="12" fill="#94A3B8">Real-time Visualization</text>
    
    <g font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#22C55E">
      <rect x="20" y="125" width="75" height="20" rx="10" fill="#22C55E" fill-opacity="0.1" />
      <text x="57" y="139" text-anchor="middle">WebSockets</text>
      <rect x="100" y="125" width="90" height="20" rx="10" fill="#22C55E" fill-opacity="0.1" />
      <text x="145" y="139" text-anchor="middle">Next.js Interface</text>
    </g>
  </g>

  <!-- Footer Context -->
  <g font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#94A3B8">
    <text x="500" y="295" text-anchor="middle">Exploring the boundaries between physical environments and highly observable digital infrastructure.</text>
  </g>

</svg>